<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>テトリス風ゲーム</title>
<style>
body {
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}
canvas {
  background: #111;
}
</style>
</head>
<body>
<canvas id="game" width="240" height="400"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const COLS = 12;
const ROWS = 20;
const SIZE = 20;

let board = Array.from({length: ROWS}, () => Array(COLS).fill(0));

const piece = {
  x: 5,
  y: 0,
  shape: [
    [1,1,1],
    [0,1,0]
  ]
};

function drawCell(x, y, val) {
  if(val) {
    ctx.fillStyle = "cyan";
    ctx.fillRect(x*SIZE, y*SIZE, SIZE-1, SIZE-1);
  }
}

function draw() {
  ctx.clearRect(0,0,canvas.width,canvas.height);

  for(let y=0;y<ROWS;y++) {
    for(let x=0;x<COLS;x++) {
      drawCell(x,y,board[y][x]);
    }
  }

  piece.shape.forEach((row,dy)=>{
    row.forEach((val,dx)=>{
      if(val) drawCell(piece.x+dx, piece.y+dy, val);
    });
  });
}

function collide() {
  return piece.shape.some((row,dy)=>{
    return row.some((val,dx)=>{
      if(!val) return false;
      let x = piece.x + dx;
      let y = piece.y + dy;
      return x<0 || x>=COLS || y>=ROWS || (y>=0 && board[y][x]);
    });
  });
}

function merge() {
  piece.shape.forEach((row,dy)=>{
    row.forEach((val,dx)=>{
      if(val) board[piece.y+dy][piece.x+dx]=1;
    });
  });
}

function drop() {
  piece.y++;
  if(collide()) {
    piece.y--;
    merge();
    reset();
  }
}

function reset() {
  piece.x = 5;
  piece.y = 0;
}

function update() {
  drop();
  draw();
}

setInterval(update, 500);

document.addEventListener("keydown", e=>{
  if(e.key === "ArrowLeft") piece.x--;
  if(e.key === "ArrowRight") piece.x++;
  if(e.key === "ArrowDown") drop();
  if(collide()) {
    if(e.key === "ArrowLeft") piece.x++;
    if(e.key === "ArrowRight") piece.x--;
  }
});
</script>
</body>
</html>
