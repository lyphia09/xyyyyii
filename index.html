<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ババ抜き（ラウンド制）</title>
<style>
body{font-family:sans-serif;text-align:center;background:#888;color:white}
.hand{margin:20px;position:relative;height:100px}
.card{position:absolute;width:60px;height:80px;border-radius:10px;background:white;color:black;font-weight:bold;display:flex;align-items:center;justify-content:center;box-shadow:2px 2px 5px rgba(0,0,0,0.5);transform-origin:bottom center;transition:transform .3s}
.card:hover{transform:translateY(-10px) scale(1.1)}
.back{background:linear-gradient(45deg,#444,#222);color:#222}
.red{color:red}
#jokerEffect{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-size:80px;display:none}
.flip{animation:flip .4s}
@keyframes flip{0%{transform:rotateY(0)}50%{transform:rotateY(90deg)}100%{transform:rotateY(0)}}
.controls{margin:10px}
button{padding:6px 12px;margin:4px;border:none;border-radius:6px;cursor:pointer}
</style>
</head>
<body>
<h1>ババ抜き</h1>
<div class="controls">
  <span>対戦数：</span>
  <button onclick="setMatch(3)">3回戦</button>
  <button onclick="setMatch(5)">5回戦</button>
  <div>あなた <span id="pwin">0</span> - <span id="cwin">0</span> CPU（先に過半数で勝利）</div>
</div>
<p id="status">あなたのターン：上のカードを選んで引く</p>

<div id="jokerEffect">👿</div>

<div>
<h3>CPUの手札</h3>
<div id="cpu" class="hand"></div>
</div>

<div>
<h3>あなたの手札</h3>
<div id="player" class="hand"></div>
</div>

<script>
let player=[], cpu=[], turn='player';
let matchTotal = 3; // 3 or 5
let pWin=0, cWin=0;
const marks=['♠','♥','♦','♣'];

function setMatch(n){ matchTotal=n; resetMatch(); }

function resetMatch(){ pWin=0; cWin=0; updateScore(); init(); }

function createDeck(){
 let deck=[];
 for(let i=1;i<=13;i++) for(let m of marks) deck.push({num:i,mark:m});
 deck.push({num:'J',mark:'👿'});
 return shuffle(deck);
}

function shuffle(a){ return a.sort(()=>Math.random()-0.5); }

function deal(){
 const deck=createDeck();
 player=[]; cpu=[];
 deck.forEach((c,i)=> i%2?cpu.push(c):player.push(c));
 player=removePairs(player);
 cpu=removePairs(cpu);
}

function removePairs(hand){
 let count={};
 hand.forEach(c=>{ if(c.num!=='J') count[c.num]=(count[c.num]||0)+1; });
 for(let k in count){
  while(count[k]>=2){
    let removed=0;
    hand = hand.filter(c=>{
      if(c.num==k && removed<2){ removed++; return false; }
      return true;
    });
    count[k]-=2;
  }
 }
 return hand;
}

function showJoker(){
 const el=document.getElementById('jokerEffect');
 el.style.display='block';
 setTimeout(()=>el.style.display='none',1000);
}

function fmt(c){
 if(c.num==='J') return '👿';
 let n=c.num; if(n===1)n='A'; if(n===11)n='J'; if(n===12)n='Q'; if(n===13)n='K';
 return n+c.mark;
}

function draw(){
 const cpuDiv=document.getElementById('cpu');
 const playerDiv=document.getElementById('player');
 cpuDiv.innerHTML=''; playerDiv.innerHTML='';

 const cardWidth = 60;
 const gap = 20;

 // 中央配置計算
 const cpuStart = (cpuDiv.clientWidth - ((cpu.length-1)*gap + cardWidth)) / 2;
 const playerStart = (playerDiv.clientWidth - ((player.length-1)*gap + cardWidth)) / 2;

 cpu.forEach((_,i)=>{
  const d=document.createElement('div');
  d.className='card back';
  d.style.left=(cpuStart + i*gap)+'px';
  d.style.transform=`rotate(${i*5-10}deg)`;
  if(turn==='player') d.onclick=()=>playerTurn(i,d);
  cpuDiv.appendChild(d);
 });

 player.forEach((c,i)=>{
  const d=document.createElement('div');
  d.className='card';
  if(c.mark==='♥'||c.mark==='♦') d.classList.add('red');
  d.textContent=fmt(c);
  d.style.left=(playerStart + i*gap)+'px';
  d.style.transform=`rotate(${i*5-10}deg)`;
  playerDiv.appendChild(d);
 });
}deg)`;
  if(turn==='player') d.onclick=()=>playerTurn(i,d);
  cpuDiv.appendChild(d);
 });

 player.forEach((c,i)=>{
  const d=document.createElement('div');
  d.className='card';
  if(c.mark==='♥'||c.mark==='♦') d.classList.add('red');
  d.textContent=fmt(c);
  d.style.left=(i*20)+'px';
  d.style.transform=`rotate(${i*5-10}deg)`;
  playerDiv.appendChild(d);
 });
}

function playerTurn(index,el){
 if(turn!=='player') return;
 el.classList.add('flip');
 setTimeout(()=>{
  const card=cpu.splice(index,1)[0];
  player.push(card);
  if(card.num==='J') showJoker();
  player=removePairs(player);
  turn='cpu';
  setStatus('CPUのターン');
  draw(); checkRound();
  setTimeout(cpuTurn,700);
 },200);
}

function cpuTurn(){
 if(player.length===0) return;
 const i=(Math.random()*player.length)|0;
 const card=player.splice(i,1)[0];
 cpu.push(card);
 if(card.num==='J') showJoker();
 cpu=removePairs(cpu);
 turn='player';
 setStatus('あなたのターン：上のカードを選んで引く');
 draw(); checkRound();
}

function checkRound(){
 if(player.length===0){ pWin++; endRound('あなた'); }
 else if(cpu.length===0){ cWin++; endRound('CPU'); }
}

function endRound(winner){
 updateScore();
 const need = Math.floor(matchTotal/2)+1; // 過半数
 if(pWin>=need || cWin>=need){
   setTimeout(()=>{
     alert((pWin>cWin?'あなた':'CPU')+' の勝ち！（'+pWin+'-'+cWin+'）');
     resetMatch();
   },100);
 } else {
   setTimeout(()=>{
     alert(winner+' がこのラウンド勝利！ 次のラウンドへ');
     init();
   },100);
 }
}

function updateScore(){
 document.getElementById('pwin').textContent=pWin;
 document.getElementById('cwin').textContent=cWin;
}

function setStatus(t){ document.getElementById('status').textContent=t; }

function init(){ deal(); turn='player'; setStatus('あなたのターン：上のカードを選んで引く'); draw(); }

// 初期化
updateScore(); init();
</script>
</body>
</html>
