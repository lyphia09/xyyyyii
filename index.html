<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>BBNK</title>
<style>
body{font-family:sans-serif;text-align:center;background:#0b5;color:white}
.hand{margin:10px}
.card{display:inline-block;padding:10px 15px;margin:5px;border-radius:8px;background:white;color:black;cursor:pointer}
.back{background:#333;color:#333}
</style>
</head>
<body>
<h1>ババ抜き</h1>
<p id="status">あなたのターン：上のカードを選んで引く</p>

<div>
<h3>CPUの手札（ここをクリック）</h3>
<div id="cpu" class="hand"></div>
</div>

<div>
<h3>あなたの手札</h3>
<div id="player" class="hand"></div>
</div>

<script>
let player=[], cpu=[], turn='player';

function createDeck(){
 let deck=[];
 for(let i=1;i<=13;i++) deck.push(i,i);
 deck.push('J');
 return shuffle(deck);
}

function shuffle(arr){ return arr.sort(()=>Math.random()-0.5); }

function deal(){
 let deck=createDeck();
 player=[]; cpu=[];
 deck.forEach((c,i)=> i%2?cpu.push(c):player.push(c));
 player = removePairs(player);
 cpu = removePairs(cpu);
}

function removePairs(hand){
 let count={};
 hand.forEach(c=>{ if(c!=='J') count[c]=(count[c]||0)+1; });
 for(let k in count){
  while(count[k]>=2){
    let removed=0;
    hand = hand.filter(c=>{
      if(c==k && removed<2){ removed++; return false; }
      return true;
    });
    count[k]-=2;
  }
 }
 return hand;
}

function draw(){
 const cpuDiv = document.getElementById('cpu');
 const playerDiv = document.getElementById('player');
 cpuDiv.innerHTML=''; playerDiv.innerHTML='';

 cpu.forEach((_,i)=>{
  let div=document.createElement('div');
  div.className='card back';
  div.textContent='?';
  if(turn==='player'){
    div.onclick=()=>playerTurn(i);
    div.style.cursor='pointer';
  } else {
    div.style.cursor='default';
  }
  cpuDiv.appendChild(div);
 });

 player.forEach(c=>{
  let div=document.createElement('div');
  div.className='card';
  div.textContent=c;
  playerDiv.appendChild(div);
 });
}

function playerTurn(index){
 if(turn!=='player') return;
 if(cpu.length===0) return;

 let card = cpu.splice(index,1)[0];
 player.push(card);
 player = removePairs(player);

 document.getElementById('status').textContent = 'CPUのターン';
 turn='cpu';
 draw();
 checkWin();
 setTimeout(cpuTurn,800);
}

function cpuTurn(){
 if(player.length===0) return;
 let i=Math.floor(Math.random()*player.length);
 let card=player.splice(i,1)[0];
 cpu.push(card);
 cpu = removePairs(cpu);

 document.getElementById('status').textContent = 'あなたのターン：上のカードを選んで引く';
 turn='player';
 draw();
 checkWin();
}

function checkWin(){
 if(player.length===0){ alert('あなたの勝ち！'); init(); }
 if(cpu.length===0){ alert('CPUの勝ち！'); init(); }
}

function init(){
 deal();
 draw();
 document.getElementById('status').textContent = 'あなたのターン：上のカードを選んで引く';
 turn='player';
}

init();
</script>
</body>
</html>
